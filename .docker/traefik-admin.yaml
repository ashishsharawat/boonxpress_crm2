# Traefik dynamic config for admin.enabble.com → React admin panel (enabble-admin)
# Place this at: /data/coolify/proxy/dynamic/admin-enabble-com.yaml

http:
  routers:
    admin-enabble-http:
      rule: "Host(`admin.enabble.com`)"
      entryPoints:
        - http
      middlewares:
        - tenant-redirect-to-https
      service: enabble-admin-static
      priority: 100

    admin-enabble-https:
      rule: "Host(`admin.enabble.com`)"
      entryPoints:
        - https
      middlewares:
        - tenant-gzip
      service: enabble-admin-static
      tls:
        certResolver: letsencrypt
      priority: 100

  services:
    enabble-admin-static:
      loadBalancer:
        servers:
          - url: "http://enabble-admin-1:80"
