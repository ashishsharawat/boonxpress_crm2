{%- extends "templates/web.html" -%}

{%- block title -%}{{ business_name }} - BoonCRM{%- endblock -%}

{%- block head_include -%}
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#6366F1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="stylesheet" href="/assets/boonxpress_crm/frontend/assets/index.css" />
{%- endblock -%}

{%- block page_content -%}
<div id="booncrm-app"></div>
<script>
  window.csrf_token = "{{ csrf_token }}";
  window.__booncrm_config__ = {{ booncrm_config | safe }};
</script>
<script type="module" src="/assets/boonxpress_crm/frontend/assets/index.js"></script>
{%- endblock -%}

{%- block footer -%}{%- endblock -%}
